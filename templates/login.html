<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #1d2671, #c33764);
}

.login-box {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);

    padding: 40px;
    border-radius: 15px;

    width: 300px;
    text-align: center;

    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color: white;
}

.login-box h2 {
    margin-bottom: 20px;
}
.login-box {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
.input-box {
    margin: 15px 0;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;

    background: #00c6ff;
    background: linear-gradient(to right, #0072ff, #00c6ff);

    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>
    <form method="POST">
        <div class="input-box">
            <input name="username" placeholder="Username" required>
        </div>
        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit">Masuk</button>
    </form>
</div>

</body>
</html>
