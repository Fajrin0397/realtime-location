<!DOCTYPE html>
<html>
<head>
    <title>Realtime Tracking</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        .top-bar{
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height:54px;
            background: rgb(32, 138, 165);
            display: flex;
            align-items: center;
            color: white;
        }

        #app {
        font-family: Avenir, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-align: center;
        color: #2c3e50;
        margin-top: 60px;
        }
      .MapBox{
        background: black;
        width: 100%;
        height: 500px; 
        background: black;
        top: 50px;
        right: 0;
        }
        .top-bar h3{
        
        margin-right: 25px;
        right: 0px;
        }
        
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>
<nav class="top-bar"></nav>
<h3>Login sebagai: {{ username }}</h3>
<div id="map"></div>

<script>
// ======================
// MAP INIT
// ======================
var map = L.map('map').setView([-5.1477, 119.4327], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// ======================
// SOCKET
// ======================
var socket = io();
var mySid = null;

// ======================
// MARKER STORAGE
// ======================
var markers = {};
var markerGroup = L.layerGroup().addTo(map);

// ======================
// ICON
// ======================
function createIcon(isMe) {
    return new L.Icon({
        iconUrl: isMe
            ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png'
            : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41]
    });
}

// ======================
// UPDATE MARKER
// ======================
function upsertUserMarker(sid, user) {
    if (markers[sid]) {
        markerGroup.removeLayer(markers[sid]);
    }

    const isMe = sid === mySid;

    const marker = L.marker([user.lat, user.lng], {
        icon: createIcon(isMe)
    })
    .bindPopup(`<b>${user.name}</b>`)
    .addTo(markerGroup);

    markers[sid] = marker;
}

// ======================
// INIT DATA
// ======================
socket.on('init', function(data) {
    mySid = data.sid;

    for (const sid in data.users) {
        const user = data.users[sid];
        if (user.lat !== null) {
            upsertUserMarker(sid, user);
        }
    }
});

// ======================
// UPDATE USERS
// ======================
socket.on('update_users', function(users) {
    for (const sid in users) {
        const user = users[sid];

        if (user.lat !== null) {
            upsertUserMarker(sid, user);
        }
    }
});

// ======================
// REMOVE USER
// ======================
socket.on('remove_user', function(sid) {
    if (markers[sid]) {
        markerGroup.removeLayer(markers[sid]);
        delete markers[sid];
    }
});

// ======================
// GEOLOCATION
// ======================
navigator.geolocation.watchPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;

    if (!window._mapSet) {
        map.setView([lat, lng], 17);
        window._mapSet = true;
    }

    socket.emit('update_location', {
        lat: lat,
        lng: lng
    });

}, function(err) {
    console.warn(err);
}, {
    enableHighAccuracy: true
});
</script>

</body>
</html>
